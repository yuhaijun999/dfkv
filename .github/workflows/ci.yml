name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: build & test (${{ matrix.compiler }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        compiler: [g++, clang++]
    env:
      CXX: ${{ matrix.compiler }}
    steps:
      - uses: actions/checkout@v6

      - name: Install build & test deps
        run: |
          # Drop preinstalled third-party apt sources (google-chrome, microsoft):
          # their mirrors intermittently break `apt-get update` (size mismatch
          # "Mirror sync in progress", or 403/"no longer signed" on the azure-cli
          # repo), which has nothing to do with our deps (all from the Ubuntu
          # archive). Match by content, not filename: the offending source lives
          # in different files across runner images (microsoft-prod.list,
          # azure-cli.list, *.sources, ...), so a fixed rm list misses some.
          sudo grep -rlE 'packages\.microsoft\.com|dl\.google\.com' \
            /etc/apt/sources.list.d/ 2>/dev/null | sudo xargs -r rm -f
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build g++ clang python3 python3-numpy git ca-certificates

      - name: Cache FetchContent (googletest)
        uses: actions/cache@v5
        with:
          path: build/_deps
          key: deps-${{ runner.os }}-${{ matrix.compiler }}-gtest-1.12.1

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j

      - name: Test (C++ gtests + Python plugin)
        run: ctest --test-dir build --output-on-failure -j

  thread-sanitizer:
    name: ThreadSanitizer (race detection)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install deps
        run: |
          # Drop preinstalled third-party apt sources (google-chrome, microsoft):
          # their mirrors intermittently break `apt-get update` (size mismatch
          # "Mirror sync in progress", or 403/"no longer signed" on the azure-cli
          # repo), which has nothing to do with our deps (all from the Ubuntu
          # archive). Match by content, not filename: the offending source lives
          # in different files across runner images (microsoft-prod.list,
          # azure-cli.list, *.sources, ...), so a fixed rm list misses some.
          sudo grep -rlE 'packages\.microsoft\.com|dl\.google\.com' \
            /etc/apt/sources.list.d/ 2>/dev/null | sudo xargs -r rm -f
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends cmake ninja-build g++ git ca-certificates
      - name: Build with TSan
        run: |
          cmake -S . -B build-tsan -G Ninja -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_CXX_FLAGS="-fsanitize=thread -g -O1" \
            -DCMAKE_EXE_LINKER_FLAGS=-fsanitize=thread \
            -DCMAKE_SHARED_LINKER_FLAGS=-fsanitize=thread
          cmake --build build-tsan -j
      - name: Run C++ suites under TSan (python excluded — ctypes dlopen)
        run: TSAN_OPTIONS=halt_on_error=1 ctest --test-dir build-tsan -E python_plugin --output-on-failure

  rdma-compile:
    name: RDMA build (compile-check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install deps incl. RDMA dev
        run: |
          # Drop preinstalled third-party apt sources (google-chrome, microsoft):
          # their mirrors intermittently break `apt-get update` (size mismatch
          # "Mirror sync in progress", or 403/"no longer signed" on the azure-cli
          # repo), which has nothing to do with our deps (all from the Ubuntu
          # archive). Match by content, not filename: the offending source lives
          # in different files across runner images (microsoft-prod.list,
          # azure-cli.list, *.sources, ...), so a fixed rm list misses some.
          sudo grep -rlE 'packages\.microsoft\.com|dl\.google\.com' \
            /etc/apt/sources.list.d/ 2>/dev/null | sudo xargs -r rm -f
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build g++ git ca-certificates libibverbs-dev
      - name: Configure + build with DFKV_WITH_RDMA=ON (no device at runtime)
        run: |
          cmake -S . -B build-rdma -G Ninja -DCMAKE_BUILD_TYPE=Release \
            -DDFKV_WITH_RDMA=ON -DDFKV_BUILD_TESTS=OFF
          cmake --build build-rdma -j
      - name: Verify ibverbs linked
        run: ldd build-rdma/dfkv_server | grep ibverbs

  rdma-loopback:
    name: RDMA datapath (Soft-RoCE loopback + TSan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install deps incl. RDMA dev + tools
        run: |
          # Drop preinstalled third-party apt sources (google-chrome, microsoft):
          # their mirrors intermittently break `apt-get update` (size mismatch
          # "Mirror sync in progress", or 403/"no longer signed" on the azure-cli
          # repo), which has nothing to do with our deps (all from the Ubuntu
          # archive). Match by content, not filename: the offending source lives
          # in different files across runner images (microsoft-prod.list,
          # azure-cli.list, *.sources, ...), so a fixed rm list misses some.
          sudo grep -rlE 'packages\.microsoft\.com|dl\.google\.com' \
            /etc/apt/sources.list.d/ 2>/dev/null | sudo xargs -r rm -f
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build g++ git ca-certificates \
            libibverbs-dev rdma-core iproute2
      - name: Set up Soft-RoCE (rdma_rxe) over loopback
        run: |
          # rxe over 'lo' keeps packets in-host, so RC self-loopback actually
          # works in CI (rxe over a physical NIC relies on the network hairpinning
          # packets back, which GitHub runners don't do).
          sudo modprobe rdma_rxe || true
          sudo rdma link add rxe0 type rxe netdev lo || true
          rdma link show || true
      - name: Build (RDMA + tests)
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DDFKV_WITH_RDMA=ON
          cmake --build build -j --target rdma_loopback_test
      # Best-effort: the runner's Soft-RoCE rxe may not actually round-trip RC
      # traffic to itself (the test build above is the hard gate; the datapath is
      # hard-gated locally + on real RDMA HW where rxe loopback works). We still
      # run it here for signal — continue-on-error so an rxe env quirk can't block.
      - name: Run RDMA datapath test (best-effort; logs results)
        continue-on-error: true
        run: |
          ulimit -l unlimited 2>/dev/null || true
          ./build/rdma_loopback_test
      - name: Build + run RDMA datapath test under ThreadSanitizer (best-effort)
        continue-on-error: true
        run: |
          cmake -S . -B build-tsan -G Ninja -DCMAKE_BUILD_TYPE=RelWithDebInfo -DDFKV_WITH_RDMA=ON \
            -DCMAKE_CXX_FLAGS="-fsanitize=thread -g -O1" \
            -DCMAKE_EXE_LINKER_FLAGS=-fsanitize=thread \
            -DCMAKE_SHARED_LINKER_FLAGS=-fsanitize=thread
          cmake --build build-tsan -j --target rdma_loopback_test
          ulimit -l unlimited 2>/dev/null || true
          TSAN_OPTIONS=halt_on_error=1 ./build-tsan/rdma_loopback_test

  portable-static-build:
    name: portable static artifacts
    runs-on: ubuntu-latest
    # Build inside ubuntu:22.04 (glibc 2.35) so the dynamically-linked artifacts
    # have a low glibc floor and run on any node with glibc >= 2.35. Building on
    # the runner's ubuntu-latest (glibc 2.39) bakes in GLIBC_2.3x symbols that
    # FAIL on older deploy nodes. RDMA-enabled + static libstdc++/libgcc;
    # libibverbs stays dynamic (it dlopen()s provider drivers at runtime).
    container: ubuntu:22.04
    steps:
      # Bare container: install the toolchain (incl. git, for checkout) first.
      - name: Install build deps
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            cmake ninja-build g++ binutils git ca-certificates libibverbs-dev xz-utils tar
      - uses: actions/checkout@v6
      - name: Build portable RDMA artifacts (static libstdc++, no tests)
        run: |
          cmake -S . -B build-static -G Ninja -DCMAKE_BUILD_TYPE=Release \
            -DDFKV_BUILD_TESTS=OFF -DDFKV_WITH_RDMA=ON -DDFKV_STATIC_LIBSTDCXX=ON
          cmake --build build-static -j
          strip build-static/dfkv_server build-static/dfkv_mds build-static/dfkv_bench \
                build-static/dfkv_smoke build-static/dfkvctl build-static/libdfkv.so || true
      - name: Verify portability (glibc floor + RDMA linked + static libstdc++)
        run: |
          echo "== glibc floor (must be <= 2.35) =="
          objdump -T build-static/dfkv_server build-static/libdfkv.so \
            | grep -oE 'GLIBC_[0-9.]+' | sort -uV | tail -3
          echo "== libdfkv.so deps (expect libibverbs, NOT libstdc++) =="
          ldd build-static/libdfkv.so
          if ldd build-static/libdfkv.so | grep -q 'libstdc++'; then
            echo 'ERROR: libstdc++ is not statically linked'; exit 1; fi
          if objdump -T build-static/dfkv_server build-static/libdfkv.so \
               | grep -qoE 'GLIBC_2\.(3[6-9]|[4-9][0-9])'; then
            echo 'ERROR: glibc floor exceeds 2.35'; exit 1; fi
      - name: Package portable tarball
        run: |
          V=$(cat VERSION)
          PKG="dfkv-${V}-linux-x86_64"
          mkdir -p "$PKG/bin" "$PKG/lib" "$PKG/python"
          cp build-static/dfkv_server build-static/dfkv_mds build-static/dfkv_bench \
             build-static/dfkv_smoke build-static/dfkvctl "$PKG/bin/"
          cp build-static/libdfkv.so "$PKG/lib/"
          cp python/dfkv_hicache.py python/dfkv_access_log.py python/dfkv_metrics.py "$PKG/python/"
          # 共享遥测包：dfkv_hicache.py 顶部 `from dfkv_telemetry import ...`，
          # 不一起打包则 SGLang 插件加载即 ImportError。
          cp -r python/dfkv_telemetry "$PKG/python/"
          # vLLM / LMCache 连接器（源码 Python 包，随 release 一起发，便于免源码直接 pip install 对接）
          mkdir -p "$PKG/integration"
          cp -r integration/vllm integration/lmcache "$PKG/integration/"
          find "$PKG/python" "$PKG/integration" -type d \( -name '__pycache__' -o -name '*.egg-info' -o -name '.pytest_cache' \) -prune -exec rm -rf {} + 2>/dev/null || true
          cp README.md VERSION LICENSE "$PKG/"
          tar czf "${PKG}.tar.gz" "$PKG"
          sha256sum "${PKG}.tar.gz"
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dfkv-linux-x86_64
          path: dfkv-*-linux-x86_64.tar.gz
